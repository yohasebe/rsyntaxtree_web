name: Build and push Docker image (GHCR)

# Builds the multi-arch web-UI image and publishes it to the GitHub Container
# Registry (GHCR). Run it manually from the Actions tab (Run workflow), or it
# fires automatically when a v* tag is pushed. The image version is read from
# lib/rsyntaxtree_web/version.rb so it stays in sync with the app.
on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  IMAGE: ghcr.io/yohasebe/rsyntaxtree

jobs:
  build-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Read app version
        id: ver
        run: |
          version=$(grep -oE '[0-9]+\.[0-9]+\.[0-9]+' lib/rsyntaxtree_web/version.rb | head -1)
          if [ -z "$version" ]; then echo "could not read version" >&2; exit 1; fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "Building $IMAGE:$version"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (linux/amd64, linux/arm64)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ steps.ver.outputs.version }}
            ${{ env.IMAGE }}:latest
          labels: |
            org.opencontainers.image.source=https://github.com/yohasebe/rsyntaxtree_web
            org.opencontainers.image.version=${{ steps.ver.outputs.version }}
